services:
  foodorder.api:
    build:
      context: ./FoodOrder.Api
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=FoodOrderDb;User Id=sa;Password=YourStrongPassword123!;TrustServerCertificate=True;"
    depends_on:
      - sqlserver

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrongPassword123!"
    ports:
      - "14330:1433"
    volumes:
      - sql_data:/var/opt/mssql/

volumes:
  sql_data: